name: Android Release CI

on:
  # 1. 保留原有的 Release 触发
  release:
    types: [published]
  
  # 2. 添加手动触发
  workflow_dispatch:
    inputs:
      remarks:
        description: '手动触发备注'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    # 授予写入权限以支持上传到 Release
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # 完整呈现编译命令，加入 com.jmc.trax.log.logd 相关的日志环境
      run: ./gradlew assemblerelease --build-cache --parallel --no-daemon --warning-mode all

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      # 仅在有 Tag (Release 触发) 时执行此步骤
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/bundle/release/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      # 无论何种触发方式，都将生成物上传到 Actions 存储空间，方便手动下载
      uses: actions/upload-artifact@v4
      with:
        name: release-build-backups
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/bundle/release/*.aab
