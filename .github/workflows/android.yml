name: Android Release CI

on:
  # 1. 保留原有的 Release 触发
  release:
    types: [published]
  
  # 2. 添加手动触发
  workflow_dispatch:
    inputs:
      remarks:
        description: '手动触发备注'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    # 授予写入权限以支持上传到 Release
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # 完整呈现编译命令，加入 com.jmc.trax.log.logd 相关的日志环境
      run: ./gradlew assemblerelease --build-cache --parallel --no-daemon --warning-mode all

    - name: Get APK Path
      id: apk_path
      run: |
        # 使用 find 命令查找 apk 文件（排除 unsigned 版本，只保留 release 版本）
        # 这里的 -maxdepth 也可以根据实际目录深度调整
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" ! -name "*unsigned*" | head -n 1)
        echo "Found APK: $APK_FILE"
        # 将路径存入环境变量，供后续步骤使用
        echo "path=$APK_FILE" >> $GITHUB_OUTPUT

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        # 使用上一步获取到的精确路径
        files: ${{ steps.apk_path.outputs.path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DailyTask-App
        # 使用上一步获取到的精确路径，只上传这一个文件
        path: ${{ steps.apk_path.outputs.path }}
        # 设置如果没找到文件则报错，确保 CI 的严谨性
        if-no-files-found: error
